<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理</title>
    {% if site_config and site_config.site_logo %}
    <link rel="icon" href="{{ site_config.site_logo }}" type="image/png">
    {% endif %}
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --line: #dbe3ef;
            --text: #0f172a;
            --subtext: #64748b;
            --primary: #2563eb;
            --primary-2: #3b82f6;
            --focus: rgba(37, 99, 235, 0.18);
            --danger-bg: #fff1f2;
            --danger-line: #fecdd3;
            --danger-text: #be123c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            min-height: 100%;
        }

        body {
            position: relative;
            overflow: hidden;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(80% 60% at 10% 0%, #dbeafe 0%, rgba(219, 234, 254, 0) 60%),
                radial-gradient(70% 50% at 100% 100%, #e0f2fe 0%, rgba(224, 242, 254, 0) 60%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
        }

        .bg-shape {
            position: absolute;
            border-radius: 999px;
            filter: blur(36px);
            pointer-events: none;
            z-index: 0;
        }

        .bg-shape-a {
            width: 300px;
            height: 300px;
            left: -90px;
            top: -80px;
            background: rgba(59, 130, 246, 0.18);
        }

        .bg-shape-b {
            width: 260px;
            height: 260px;
            right: -60px;
            bottom: -80px;
            background: rgba(14, 165, 233, 0.18);
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: var(--panel);
            border: 1px solid rgba(219, 227, 239, 0.9);
            border-radius: 22px;
            padding: 34px 30px 28px;
            box-shadow:
                0 18px 45px rgba(15, 23, 42, 0.09),
                0 4px 14px rgba(15, 23, 42, 0.04);
            animation: card-enter 360ms ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 26px;
        }

        .lock-icon {
            width: 58px;
            height: 58px;
            margin: 0 auto 14px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            font-size: 24px;
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
            color: #fff;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.3);
        }

        .login-header h1 {
            font-size: 24px;
            letter-spacing: 0.2px;
            line-height: 1.3;
            margin-bottom: 6px;
            color: var(--text);
        }

        .login-header p {
            font-size: 14px;
            color: var(--subtext);
        }

        .error-msg {
            display: none;
            margin-bottom: 16px;
            padding: 11px 12px;
            border-radius: 12px;
            border: 1px solid var(--danger-line);
            background: var(--danger-bg);
            color: var(--danger-text);
            font-size: 13px;
            line-height: 1.45;
        }

        .error-msg.show {
            display: block;
            animation: shake 0.38s ease-in-out;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #334155;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            height: 46px;
            border-radius: 12px;
            border: 1px solid var(--line);
            background: #fbfdff;
            color: var(--text);
            padding: 0 14px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
            -webkit-appearance: none;
        }

        .form-group input::placeholder {
            color: #94a3b8;
        }

        .form-group input:focus {
            border-color: var(--primary-2);
            box-shadow: 0 0 0 4px var(--focus);
            background: #ffffff;
        }

        .login-btn {
            width: 100%;
            height: 47px;
            margin-top: 4px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.4px;
            background: linear-gradient(135deg, var(--primary-2) 0%, var(--primary) 100%);
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.32);
            filter: saturate(1.03);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 10px 22px rgba(37, 99, 235, 0.3);
        }

        .login-btn:disabled {
            cursor: not-allowed;
            opacity: 0.75;
            transform: none;
            box-shadow: none;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 12px;
            letter-spacing: 0.4px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 8px;
            vertical-align: text-top;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        @keyframes card-enter {
            from {
                transform: translateY(12px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 16px;
                align-items: end;
            }

            .login-container {
                max-width: 100%;
                border-radius: 22px 22px 0 0;
                padding: 30px 22px 26px;
                box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
            }

            .form-group input {
                height: 44px;
                font-size: 16px;
            }
        }

        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            @media (max-width: 560px) {
                .login-container {
                    padding-bottom: calc(26px + env(safe-area-inset-bottom));
                }
            }
        }
    </style>
</head>
<body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <div class="login-container">
        <div class="login-header">
            <div class="lock-icon">🔐</div>
            <h1>系统管理</h1>
            <p>请输入管理员凭据</p>
        </div>

        <div id="errorMsg" class="error-msg" role="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入管理员用户名" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">登录</button>
        </form>

        <div class="footer-text">Secure Admin Portal</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorMsg.classList.remove('show');
            errorMsg.textContent = '';

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>登录中...';

            try {
                const response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const responseText = await response.text();
                let data = {};
                try {
                    data = responseText ? JSON.parse(responseText) : {};
                } catch (parseError) {
                    console.error('admin login response parse error:', parseError, responseText);
                    errorMsg.textContent = `服务器返回格式错误（HTTP ${response.status}）`;
                    errorMsg.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '登录';
                    return;
                }

                if (data.success) {
                    window.location.href = data.redirect || '/admin';
                } else {
                    errorMsg.textContent = data.error || '登录失败';
                    errorMsg.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });

        document.getElementById('username').focus();
    </script>
</body>
</html>
